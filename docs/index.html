<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Manager</title>
  <meta name="description" content="A simple JWT-authenticated task manager." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── AUTH ── -->
  <section id="auth-section">
    <div class="auth-card">
      <h1>Task Manager</h1>
      <p class="subtitle">Sign in to manage your tasks</p>

      <div class="auth-tabs" role="tablist">
        <button id="tab-login"    class="auth-tab active" onclick="showAuthForm('login')"    role="tab">Login</button>
        <button id="tab-register" class="auth-tab"        onclick="showAuthForm('register')" role="tab">Register</button>
      </div>

      <!-- Login -->
      <form id="login-form" class="auth-form" onsubmit="handleLogin(event)" novalidate>
        <div>
          <label for="login-email">Email</label>
          <input id="login-email" type="email" placeholder="you@example.com" required />
        </div>
        <div>
          <label for="login-password">Password</label>
          <input id="login-password" type="password" placeholder="Password" required />
        </div>
        <button id="login-submit-btn" type="submit" class="btn btn-primary">
          <span class="btn-text">Sign in</span>
          <span class="btn-loading" hidden>Signing in…</span>
        </button>
        <p class="error-msg" id="login-error" role="alert"></p>
      </form>

      <!-- Register -->
      <form id="register-form" class="auth-form hidden" onsubmit="handleRegister(event)" novalidate>
        <div>
          <label for="reg-username">Username</label>
          <input id="reg-username" type="text" placeholder="Username (min 3)" required minlength="3" />
        </div>
        <div>
          <label for="reg-email">Email</label>
          <input id="reg-email" type="email" placeholder="you@example.com" required />
        </div>
        <div>
          <label for="reg-password">Password</label>
          <input id="reg-password" type="password" placeholder="Password (min 6)" required minlength="6" />
        </div>
        <button id="register-submit-btn" type="submit" class="btn btn-primary">
          <span class="btn-text">Create account</span>
          <span class="btn-loading" hidden>Creating…</span>
        </button>
        <p class="error-msg"  id="register-error"   role="alert"></p>
        <p class="success-msg" id="register-success" role="status"></p>
      </form>
    </div>
  </section>

  <!-- ── DASHBOARD ── -->
  <section id="dashboard-section" class="hidden">
    <header class="dash-header">
      <span class="brand">Task Manager</span>
      <div class="dash-user">
        <span id="username-display"></span>
        <button class="btn-logout" onclick="logout()">Logout</button>
      </div>
    </header>

    <main class="dash-main">

      <!-- Create task -->
      <div class="create-box">
        <h2>New task</h2>
        <form id="create-task-form" onsubmit="createTask(event)" novalidate>
          <div class="create-fields">
            <input id="task-title" type="text" placeholder="Task title" required />
            <textarea id="task-description" placeholder="Description (optional)" rows="2"></textarea>
            <button id="add-task-btn" type="submit" class="btn btn-primary" style="width:auto;align-self:flex-end;padding:.45rem 1.25rem;">
              <span class="btn-text">Add task</span>
              <span class="btn-loading" hidden>Adding…</span>
            </button>
          </div>
          <p class="error-msg" id="create-error" role="alert" style="margin-top:.4rem;"></p>
        </form>
      </div>

      <!-- Filters -->
      <div class="filter-bar" role="group">
        <button id="filter-all"       class="filter-btn active" onclick="setFilter(null)">All</button>
        <button id="filter-pending"   class="filter-btn"        onclick="setFilter(false)">Pending</button>
        <button id="filter-completed" class="filter-btn"        onclick="setFilter(true)">Completed</button>
      </div>

      <!-- Task list -->
      <div id="task-list" aria-live="polite">
        <div class="loading-state">Loading…</div>
      </div>

      <!-- Pagination -->
      <div id="pagination" class="pagination"></div>

    </main>
  </section>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
